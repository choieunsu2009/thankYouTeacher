name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin

            # 프로젝트 디렉토리 초기 설정
            if [ ! -d ~/03_rolling/.git ]; then
              mkdir -p ~/03_rolling
              git clone https://github.com/${{ github.repository }}.git ~/03_rolling
            fi

            cd ~/03_rolling
            git fetch origin main
            git reset --hard origin/main

            # Docker 확인 및 실행
            if command -v docker &> /dev/null; then
              docker compose down || true
              docker compose up -d --build
              sleep 10
              docker compose ps
              docker compose logs --tail=30 app
            else
              echo "=== Docker not found. Deploying with Node.js directly ==="

              # Node.js 확인
              if ! command -v node &> /dev/null; then
                echo "ERROR: Node.js is not installed on the server."
                exit 1
              fi

              cd BE
              npm install --production

              # 기존 프로세스 종료
              pkill -f "node.*server.js" || true
              sleep 1

              # PM2가 있으면 PM2로, 없으면 nohup으로 실행
              if command -v pm2 &> /dev/null; then
                pm2 delete rolling-paper || true
                pm2 start server.js --name rolling-paper
                pm2 save
                pm2 logs rolling-paper --lines 10 --nostream
              else
                nohup node server.js > ../server.log 2>&1 &
                echo "Server started with PID: $!"
                sleep 2
                tail -5 ../server.log
              fi
            fi
